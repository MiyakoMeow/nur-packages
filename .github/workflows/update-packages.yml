name: Update Packages via "updateScript"
on:
  schedule:
    - cron: "15 * * * *" # hourly at :15
  workflow_dispatch: # е…Ғи®ёжүӢеҠЁи§ҰеҸ‘

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      package_list: ${{ steps.find-packages.outputs.package_list }}
      package_count: ${{ steps.find-packages.outputs.package_count }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://miyakomeow.cachix.org/ https://nix-community.cachix.org/ https://cache.nixos.org/
            trusted-public-keys = miyakomeow.cachix.org-1:85k7pjjK1Voo+kMHJx8w3nT1rlBow3+4/M+LsAuMCRY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Find packages with updateScript
        id: find-packages
        run: |
          set -euo pipefail
          export FLAKE_REF="path:$GITHUB_WORKSPACE"
          export NIXPKGS_ALLOW_UNFREE=1

          echo "Finding packages with updateScript..."
          packages=$(nix eval --impure --json --expr "
            let
              f = builtins.getFlake (builtins.getEnv \"FLAKE_REF\");
              sys = \"x86_64-linux\";
              lp = builtins.getAttr sys f.legacyPackages;
              pkgsN = import <nixpkgs> {};
              lib = pkgsN.lib;
              hasUS = pkg: (pkg ? passthru && pkg.passthru ? updateScript) || (pkg ? updateScript);
              collect = attrs: path:
                lib.concatMap (name:
                  let v = attrs.\${name}; p = path ++ [ name ]; in
                  if lib.isDerivation v then
                    if hasUS v then [ (lib.concatStringsSep \".\" p) ] else []
                  else if lib.isAttrs v then collect v p
                  else []
                ) (builtins.attrNames attrs);
            in collect lp []
          " | jq -r '.[]' | sort -u)

          count=$(echo "$packages" | wc -l)
          package_list_json=$(echo "$packages" | jq -R -s -c 'split("\n") | map(select(. != ""))')

          echo "Found $count packages with updateScript"
          echo "$packages"

          echo "package_list=$package_list_json" >> $GITHUB_OUTPUT
          echo "package_count=$count" >> $GITHUB_OUTPUT

  update-package:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.package_list) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://miyakomeow.cachix.org/ https://nix-community.cachix.org/ https://cache.nixos.org/
            trusted-public-keys = miyakomeow.cachix.org-1:85k7pjjK1Voo+kMHJx8w3nT1rlBow3+4/M+LsAuMCRY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Install dependencies
        run: nix profile install nixpkgs#nix-update

      - name: Create update branch
        id: create-branch
        run: |
          timestamp=$(date +%s)
          branch_name="update/${{ matrix.package }}-$timestamp-$GITHUB_RUN_ID"
          git checkout -b "$branch_name"
          echo "branch_name=$branch_name" >> $GITHUB_OUTPUT

      - name: Get package metadata
        id: pkg-metadata
        run: |
          set -euo pipefail
          PACKAGE="${{ matrix.package }}"
          export FLAKE_REF="path:$GITHUB_WORKSPACE"

          pkg_info=$(nix eval --impure --json --expr '
            let
              f = builtins.getFlake (builtins.getEnv "FLAKE_REF");
              sys = "x86_64-linux";
              lp = builtins.getAttr sys f.legacyPackages;
              pkgsN = import <nixpkgs> {};
              lib = pkgsN.lib;
              path = lib.strings.splitString "." "'"${PACKAGE}"'";
              pkg = lib.attrsets.attrByPath path null lp;
            in
              if pkg == null then throw "no pkg"
              else {
                name = pkg.name or "";
                pname = pkg.pname or (lib.getName pkg);
                version = pkg.version or (lib.getVersion pkg);
              }
          ')

          echo "name=$(echo "$pkg_info" | jq -r '.name // ""')" >> $GITHUB_OUTPUT
          echo "pname=$(echo "$pkg_info" | jq -r '.pname // ""')" >> $GITHUB_OUTPUT
          echo "version=$(echo "$pkg_info" | jq -r '.version // ""')" >> $GITHUB_OUTPUT

          echo "Package: ${{ matrix.package }}"
          NAME=$(jq -r '.name // ""' <<< "$pkg_info")
          PNAME=$(jq -r '.pname // ""' <<< "$pkg_info")
          VERSION=$(jq -r '.version // ""' <<< "$pkg_info")

          echo "  Name: $NAME"
          echo "  Pname: $PNAME"
          echo "  Version: $VERSION"
      - name: Get updateScript
        id: get-script
        run: |
          set -euo pipefail
          PACKAGE="${{ matrix.package }}"
          export FLAKE_REF="path:$GITHUB_WORKSPACE"

          script_json=$(nix eval --impure --json --expr '
            let
              f = builtins.getFlake (builtins.getEnv "FLAKE_REF");
              sys = "x86_64-linux";
              lp = builtins.getAttr sys f.legacyPackages;
              pkgsN = import <nixpkgs> {};
              lib = pkgsN.lib;
              path = lib.strings.splitString "." "'"${PACKAGE}"'";
              pkg = lib.attrsets.attrByPath path null lp;
            in
              if pkg == null then throw "no pkg"
              else if (pkg ? passthru && pkg.passthru ? updateScript) then pkg.passthru.updateScript
              else if (pkg ? updateScript) then pkg.updateScript
              else throw "no updateScript"
          ')

          echo "script=$script_json" >> $GITHUB_OUTPUT
          echo "type=$(echo "$script_json" | jq -r 'type')" >> $GITHUB_OUTPUT

      - name: Setup update environment
        id: setup-env
        run: |
          set -euo pipefail
          export PACKAGE="${{ matrix.package }}"
          export WORKSPACE="$GITHUB_WORKSPACE"

          # д»Һ meta.position иҺ·еҸ–и·Ҝеҫ„пјҲйҖҡз”Ёж–№жі•пјү
          # жіЁж„ҸпјҡSOURCE_DIR жҳҜеҸҜйҖүзҡ„пјҢеӨұиҙҘж—¶дёҚеҪұе“ҚеҗҺз»ӯжөҒзЁӢ
          SOURCE_DIR=$(
            nix eval --impure --raw --expr '
              let
                f = builtins.getFlake ("path:" + builtins.getEnv "WORKSPACE");
                pkg = f.legacyPackages.x86_64-linux.${builtins.getEnv "PACKAGE"};
                outPath = f.outPath;
                position = pkg.meta.position or null;
              in
                if position == null then
                  "null"
                else
                  let
                    parts = builtins.match "([^\"]+):([0-9]+)" position;
                    file = builtins.elemAt parts 0;
                  in
                    if builtins.substring 0 1 file == "/" then
                      let
                        relPath = builtins.substring (builtins.stringLength outPath + 1) (builtins.stringLength file) file;
                        dirPath = builtins.dirOf (builtins.getEnv "WORKSPACE" + "/" + relPath);
                      in
                        dirPath
                    else
                      "null"
            ' 2>/dev/null || echo "null"
          )

          # йӘҢиҜҒзӣ®еҪ•
          if [[ -n "$SOURCE_DIR" && "$SOURCE_DIR" != "null" && -d "$SOURCE_DIR" ]]; then
            echo "UPDATE_NIX_SOURCE_DIR=$SOURCE_DIR" >> $GITHUB_OUTPUT
            echo "вң“ жәҗз Ғзӣ®еҪ•: $SOURCE_DIR"
          else
            echo "UPDATE_NIX_SOURCE_DIR=" >> $GITHUB_OUTPUT
            echo "вҡ  ж— жі•зЎ®е®ҡжәҗз Ғзӣ®еҪ•пјҲеҢ…еҸҜиғҪжІЎжңү meta.position жҲ–и·Ҝеҫ„ж— ж•Ҳпјү"
          fi

      - name: Parse command
        id: parse-cmd
        run: |
          script_json='${{ steps.get-script.outputs.script }}'
          script_type='${{ steps.get-script.outputs.type }}'

          # жЈҖжөӢзұ»еһӢе№¶жҸҗеҸ–е‘Ҫд»ӨеҶ…е®№
          case "$script_type" in
            array)
              cmd=$(echo "$script_json" | jq -c '.')
              cmd_type="array"
              ;;
            string)
              cmd=$(echo "$script_json" | jq -c '.')
              cmd_type=$(echo "$script_json" | jq -r 'type')
              ;;
            object)
              cmd=$(echo "$script_json" | jq -c '.command')
              cmd_type=$(echo "$cmd" | jq -r 'type')
              ;;
          esac

          echo "cmd=$cmd" >> $GITHUB_OUTPUT
          echo "cmd_type=$cmd_type" >> $GITHUB_OUTPUT

      - name: Build command array
        id: build-cmd-array
        run: |
          cmd='${{ steps.parse-cmd.outputs.cmd }}'
          cmd_type='${{ steps.parse-cmd.outputs.cmd_type }}'

          # ж №жҚ®зұ»еһӢжһ„е»әе‘Ҫд»Өж•°з»„
          case "$cmd_type" in
            array)
              cmd_array="$cmd"
              ;;
            string)
              # еӯ—з¬ҰдёІзұ»еһӢд»ЈиЎЁеҚ•дёӘе‘Ҫд»ӨпјҢеҢ…иЈ…жҲҗеҚ•е…ғзҙ ж•°з»„
              cmd_array=$(echo "$cmd" | jq -c '[.]')
              ;;
          esac

          echo "cmd_array=$cmd_array" >> $GITHUB_OUTPUT

      - name: Execute command
        run: |
          set -euo pipefail
          export FLAKE_REF="path:$GITHUB_WORKSPACE"
          export NIXPKGS_ALLOW_UNFREE=1
          export NIXPKGS_ALLOW_BROKEN=1
          export NIXPKGS_ALLOW_INSECURE=1
          export UPDATE_NIX_ATTR_PATH="${{ matrix.package }}"
          export UPDATE_NIX_NAME="${{ steps.pkg-metadata.outputs.name }}"
          export UPDATE_NIX_PNAME="${{ steps.pkg-metadata.outputs.pname }}"
          export UPDATE_NIX_OLD_VERSION="${{ steps.pkg-metadata.outputs.version }}"
          export UPDATE_NIX_SOURCE_DIR="${{ steps.setup-env.outputs.UPDATE_NIX_SOURCE_DIR }}"

          cmd_array='${{ steps.build-cmd-array.outputs.cmd_array }}'

          # е°Ҷ JSON ж•°з»„иҪ¬жҚўдёә bash ж•°з»„
          mapfile -t cmd < <(echo "$cmd_array" | jq -r '.[]')

          echo "Executing: ${cmd[*]}"
          "${cmd[@]}"

      - name: Check for existing PR
        id: check-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR=$(gh pr list --state open \
            --json number,headRefName \
            -q '.[] | select(.headRefName | startswith("update/${{ matrix.package }}-")) | .number')

          if [ -n "$EXISTING_PR" ]; then
            echo "Found existing PR #$EXISTING_PR"
            echo "has_existing_pr=true" >> $GITHUB_OUTPUT
          else
            echo "has_existing_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub App Token
        id: gen-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.HELPER_BOT_APP_ID }}
          private_key: ${{ secrets.HELPER_BOT_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.check-pr.outputs.has_existing_pr != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ steps.create-branch.outputs.branch_name }}
          title: "${{ matrix.package }}: auto-update by updateScript"
          body: |
            Automated update for ${{ matrix.package }}

            Generated by the package's updateScript
          labels: automated, dependencies
          token: ${{ steps.gen-token.outputs.token }}
