name: "Merge Helper PRs"
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  checks: read
  pull-requests: write

jobs:
  merge-helper-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'miyakomeow-helper-bot[bot]'
    steps:
      - name: Wait for CI to start
        run: sleep 30

      - name: Wait for CI completion
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          scripts/actions/wait-for-actions.sh "$PR_NUMBER"

      - name: Merge Pull Request
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr merge "$PR_NUMBER" --squash --delete-branch